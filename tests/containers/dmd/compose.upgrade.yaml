name: dmd_upgrade
services:
  up:
    build:
      context: "."
    volumes:
      - "./data:/metadb-data"
      - "./config:/metadb-config"
    environment:
      - "SCRIPT_NAME=/metadb"
      - "REQUEST_TIMEOUT=120"
    restart: "no"
    networks:
      - localtest2
    command: ["upgrade"]

networks:
  localtest2:
    name: localtest2
    external: true
